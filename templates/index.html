<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VANGUARD | Secure Protocol Access</title>
    <meta name="description" content="VANGUARD — Time-Bound Crypto-Protection System. Login to begin.">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .role-btn {
            background: transparent;
            border: 1px solid var(--border-cyan);
            color: var(--text-dim);
            padding: 0.6rem;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 1;
        }

        .role-btn.active#role-admin {
            background: var(--primary-cyan);
            color: #000 !important;
            border-color: var(--primary-cyan);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.6);
            font-weight: 800;
        }

        .role-btn.active#role-user {
            background: var(--primary-lime);
            color: #000 !important;
            border-color: var(--primary-lime);
            box-shadow: 0 0 20px rgba(182, 255, 0, 0.6);
            font-weight: 800;
        }
    </style>
</head>

<body>
    <div class="panel login-box">
        <h1 class="logo" style="text-align:center;margin-bottom:.5rem;">VANGUARD</h1>
        <p style="text-align:center;color:var(--text-dim);margin-bottom:2rem;font-size:0.75rem;letter-spacing:3px;">
            SECURE PROTOCOL ACCESS</p>
        <div style="margin-bottom:1.5rem;">
            <label class="field-label" style="text-align:center;">PROTOCOL LEVEL</label>
            <div style="display:flex; gap:0.5rem;">
                <button type="button" id="role-admin" class="role-btn active" style="flex:1;"
                    onclick="setLoginRole('admin')">ADMIN</button>
                <button type="button" id="role-user" class="role-btn" style="flex:1;"
                    onclick="setLoginRole('user')">USER</button>
            </div>
        </div>

        <form id="login-form">
            <input type="text" id="username" placeholder="USERNAME" required autocomplete="username">
            <input type="password" id="password" placeholder="PASSWORD" required autocomplete="current-password">
            <button type="submit" class="btn" style="width:100%;" id="login-btn">AUTHORIZE</button>
        </form>
        <p id="login-error"
            style="color:var(--danger);margin-top:1rem;text-align:center;font-size:0.8rem;min-height:1.2em;"></p>
    </div>
    <script>
        let currentRole = 'admin';
        const roleCredentials = {
            'admin': { u: 'admin', p: 'admin123' },
            'user': { u: 'operator', p: 'operator123' }
        };

        // Initialize with default role
        window.addEventListener('DOMContentLoaded', () => {
            setLoginRole('admin');
        });

        window.setLoginRole = function (role) {
            currentRole = role;
            document.getElementById('role-admin').classList.toggle('active', role === 'admin');
            document.getElementById('role-user').classList.toggle('active', role === 'user');

            // Auto-fill credentials for convenience
            const creds = roleCredentials[role];
            document.getElementById('username').value = creds.u;
            document.getElementById('password').value = creds.p;
        };

        // Redirect if already authenticated
        if (localStorage.getItem('access_token')) {
            window.location.href = '/dashboard/';
        }
        const loginForm = document.getElementById('login-form');
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('login-error');
            const btn = document.getElementById('login-btn');

            errorEl.innerText = '';
            btn.innerText = 'VERIFYING...';
            btn.disabled = true;

            try {
                const resp = await fetch('/api/auth/login/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                if (resp.ok) {
                    const data = await resp.json();
                    localStorage.setItem('access_token', data.access);
                    localStorage.setItem('refresh_token', data.refresh);
                    localStorage.setItem('username', username);
                    window.location.href = '/dashboard/';
                } else {
                    errorEl.innerText = 'AUTHORIZATION FAILED: INVALID CREDENTIALS';
                    btn.innerText = 'AUTHORIZE';
                    btn.disabled = false;
                }
            } catch (err) {
                errorEl.innerText = 'COMMUNICATION ERROR: SYSTEM OFFLINE';
                btn.innerText = 'AUTHORIZE';
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
