<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VANGUARD | Secure Protocol Access</title>
    <meta name="description" content="VANGUARD — Time-Bound Crypto-Protection System. Login to begin.">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
    </style>
</head>

<body>
    <div class="panel login-box">
        <h1 class="logo" style="text-align:center;margin-bottom:.5rem;">VANGUARD</h1>
        <p style="text-align:center;color:var(--text-dim);margin-bottom:2rem;font-size:0.75rem;letter-spacing:3px;">
            SECURE PROTOCOL ACCESS</p>
        <form id="login-form">
            <input type="text" id="username" placeholder="USERNAME" required autocomplete="username">
            <input type="password" id="password" placeholder="PASSWORD" required autocomplete="current-password">
            <button type="submit" class="btn" style="width:100%;" id="login-btn">AUTHORIZE</button>
        </form>
        <p id="login-error"
            style="color:var(--danger);margin-top:1rem;text-align:center;font-size:0.8rem;min-height:1.2em;"></p>
    </div>
    <script>
        // Redirect if already authenticated
        if (localStorage.getItem('access_token')) {
            window.location.href = '/dashboard/';
        }
        const loginForm = document.getElementById('login-form');
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('login-error');
            const btn = document.getElementById('login-btn');
            btn.innerText = 'VERIFYING...';
            btn.disabled = true;
            try {
                const resp = await fetch('/api/auth/login/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                if (resp.ok) {
                    const data = await resp.json();
                    localStorage.setItem('access_token', data.access);
                    localStorage.setItem('refresh_token', data.refresh);
                    localStorage.setItem('username', username);
                    window.location.href = '/dashboard/';
                } else {
                    errorEl.innerText = 'AUTHORIZATION FAILED: INVALID CREDENTIALS';
                    btn.innerText = 'AUTHORIZE';
                    btn.disabled = false;
                }
            } catch (err) {
                errorEl.innerText = 'COMMUNICATION ERROR: SYSTEM OFFLINE';
                btn.innerText = 'AUTHORIZE';
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
